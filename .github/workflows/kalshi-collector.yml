name: Kalshi trade-flow collector

# Runs often to accumulate institutional-flow samples (block + large-trade share).
# A single run only sees ~20 min of trades, so frequency is what builds a real
# daily/weekly picture. Does NOT post to Slack — just updates the flow file.
on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: kalshi-flow-commit
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sample recent trades into daily buckets
        run: python3 trade_collector.py --pages 120

      - name: Persist trade-flow state
        run: |
          git config user.name  "kalshi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add config/kalshi_trade_flow.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update trade-flow samples [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main || true
              git push && break || sleep 5
            done
          fi
