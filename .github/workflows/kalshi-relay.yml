name: Kalshi Investor Pulse -> Slack

# Weekly digest. WoW/MoM history + trade-flow state persist by being committed
# back into the repo (see the "Persist" step), so they survive any gap.
on:
  schedule:
    - cron: "0 14 * * 1"   # Mondays 14:00 UTC (~7:00 AM PT)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Pull Kalshi data and post to Slack
        env:
          SLACK_RELAY_TOKEN: ${{ secrets.SLACK_RELAY_TOKEN }}
          SLACK_CHANNEL_ID:  ${{ secrets.SLACK_CHANNEL_ID }}
          DUNE_API_KEY:      ${{ secrets.DUNE_API_KEY }}
        run: python3 slack_relay.py --channel "$SLACK_CHANNEL_ID" --send

      - name: Persist snapshot history
        run: |
          git config user.name  "kalshi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add config/kalshi_snapshot_history.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update WoW/MoM snapshot history [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main || true
              git push && break || sleep 5
            done
          fi
